{% extends 'auth_base.html' %}


{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>👨‍⚕️ Doctor Registration</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-primary">
                    Register Doctor
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
