{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-danger text-white">

        <h3>
            Cancel Appointment
        </h3>

    </div>

    <div class="card-body">

        <p>

            Are you sure you want to cancel
            this appointment?

        </p>

        <p>

            <strong>Patient:</strong>

            {{ object.patient.user.username }}

            <br>

            <strong>Doctor:</strong>

            {{ object.doctor.user.username }}

            <br>

            <strong>Date:</strong>

            {{ object.appointment_date }}

        </p>

        <form method="POST">

            {% csrf_token %}

            <button
                type="submit"
                class="btn btn-danger">

                Cancel Appointment

            </button>

            <a href="{% url 'appointment-list' %}"
               class="btn btn-secondary">

                Back

            </a>

        </form>

    </div>

</div>

{% endblock %}
