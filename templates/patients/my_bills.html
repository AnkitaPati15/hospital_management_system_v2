{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h2 class="mb-4">
        💳 My Bills
    </h2>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th>Amount</th>

                <th>Status</th>

                <th>Created Date</th>

            </tr>

        </thead>

        <tbody>

            {% for bill in bills %}

            <tr>

                <td>
                    ₹{{ bill.amount }}
                </td>

                <td>
                    {{ bill.status }}
                </td>

                <td>
                    {{ bill.created_at }}
                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="3"
                    class="text-center">

                    No bills found

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
