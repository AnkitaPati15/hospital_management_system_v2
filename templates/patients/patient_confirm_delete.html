{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-danger text-white">

        <h3>
            Delete Patient
        </h3>

    </div>

    <div class="card-body">

        <p>

            Are you sure you want to delete

            <strong>
                {{ object.user.username }}
            </strong>

            ?

        </p>

        <form method="POST">

            {% csrf_token %}

            <button
                type="submit"
                class="btn btn-danger">

                Delete

            </button>

            <a href="{% url 'patient-list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
