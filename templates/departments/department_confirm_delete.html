{% extends 'base.html' %}

{% block content %}

<h2>Delete Department</h2>

<p>
Are you sure you want to delete
<strong>{{ object.name }}</strong> ?
</p>

<form method="POST">

    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger">

        Delete

    </button>

    <a href="{% url 'department-list' %}"
       class="btn btn-secondary">

       Cancel

    </a>

</form>

{% endblock %}
