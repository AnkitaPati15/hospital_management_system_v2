{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h3>

            {% if object %}
                Edit Department
            {% else %}
                Add Department
            {% endif %}

        </h3>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-success">

                Save

            </button>

            <a href="{% url 'department-list' %}"
               class="btn btn-secondary">

               Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
